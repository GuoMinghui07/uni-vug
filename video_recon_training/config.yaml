data:
  dataset_id: "lance-format/openvid-lance"
  split: "train"
  video_column: "video_blob"
  video_key: "video_blob"
  video_keys: ["video_blob", "video", "blob", "bytes"]
  shuffle_buffer_size: 128
  image_size: 256
  clip_frames: 64
  window_frames: 64
  frame_stride: 1
  stream_retry:
    max_consecutive_failures: 20
    base_sleep_seconds: 1.0
    max_sleep_seconds: 30.0
  chunk_frames: 8
  chunk_start_frames: 32
  stride_values: [1, 2, 3]
  stride_probs: [0.5, 0.3, 0.2]

model:
  model_name_or_path: "Qwen/Qwen3-VL-4B-Instruct"
  decoder_config_path: "../config/decoder_config.json"
  decoder_window_size: [4096, 8, 8]
  decoder_shift_size: [0, 4, 4]
  stage1_checkpoint_path: "/scratch/e1539128/RAE/ckpts/stage1/qwen3vlrae_gram_gan/checkpoints/ep-0000032.pt"
  stage1_checkpoint_source: "ema"
  local_files_only: true
  do_resize: false
  noise_tau: 0.0
  in_channels: 3
  denormalize_output: true

training:
  epochs: 20
  steps_per_epoch: 1000
  global_batch_size: 8
  num_workers: 8
  prefetch_factor: 2
  persistent_workers: true
  precision: "bf16"
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.01
  clip_grad: 1.0
  log_interval: 20
  save_interval_steps: 2000
  seed: 42
  output_dir: "ckpts/video_recon_training"
  resume_path: null

loss:
  l1_weight: 1.0
  lpips_weight: 1.0

wandb:
  enabled: true
  entity: null
  project: "video-recon-training"
  exp_name: experiment-2
  mode: "online"
  log_interval_steps: 20
  log_media_interval_steps: 200
  log_video_fps: 4
