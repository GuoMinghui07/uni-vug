# DiT Stage-2 Video Sanity Check Configuration

model:
  mllm_model_name: "Qwen/Qwen3-VL-4B-Instruct"
  num_metaqueries: 256
  mllm_hidden_size: 2560
  local_files_only: true

  connector_expansion: 4

  rae_latent_dim: 1024
  dit_dim: 1536
  dit_ffn_dim: 8960
  dit_freq_dim: 256
  dit_num_heads: 12
  dit_num_layers: 30
  dit_patch_size: [1, 1, 1]
  dit_max_seq_len: 1024
  dit_window_size: [-1, -1]

  fm_num_steps: 50
  fm_logit_normal_mean: 0.0
  fm_logit_normal_std: 1.0
  fm_model_timestep_scale: 1000.0

rae:
  model_name_or_path: "Qwen/Qwen3-VL-4B-Instruct"
  decoder_config_path: "config/decoder_config.json"
  decoder_checkpoint_path: "/scratch/e1539128/RAE/ckpts/stage1/qwen3vlrae_gram_v1.4_448/checkpoints/ep-0000029.pt"
  decoder_checkpoint_source: "ema"
  noise_tau: 0.0
  in_channels: 3
  denormalize_output: true
  do_resize: false
  local_files_only: true

schedule_shift:
  enabled: false
  base_dim: 4096

latent_norm:
  enabled: true
  stats_path: "ckpts/latent_stats.pt"
  eps: 1.0e-6

cfg:
  context_dropout_prob: 0.0

training:
  epochs: 30
  steps_per_epoch: 5000
  # Global batch is fixed to 64; micro batch is auto-derived from GPU count.
  global_batch_size: 4
  accumulation_steps: 2
  num_workers: 2
  prefetch_factor: 2
  clip_grad: 1.0
  log_interval: 10
  sample_every: 50
  save_checkpoints: true
  checkpoint_every_steps: 3000
  maintain_ema: false
  ema_decay: 0.9999
  precision: bf16
  global_seed: 42

  optimizer:
    lr: 1.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.01

data:
  sanity_subset_dir: "sanity-check-video-data"
  sanity_subset_size: 4
  fixed_vis_count: 3
  # Randomly pick fixed_vis_count samples from sanity subset with this seed.
  # Change this value to switch to another reproducible visualization trio.
  fixed_vis_seed: 66
  video_size: 256
  window_frames: 64
  frame_stride: 2

wandb:
  enabled: true
  project: "uni-vug-dit-video"
  sample_with_ema: false
  sample_num_steps: 10
  sample_fps: 8
