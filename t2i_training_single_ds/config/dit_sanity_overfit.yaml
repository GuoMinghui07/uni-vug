# DiT Stage-2 Sanity/Overfit Configuration
# Purpose: quickly verify the end-to-end training/sampling pipeline on a tiny dataset.

model:
  # MLLM encoder
  mllm_model_name: "Qwen/Qwen3-VL-4B-Instruct"
  num_metaqueries: 256
  mllm_hidden_size: 2560
  local_files_only: true

  # Connector
  connector_expansion: 4

  # DiT
  rae_latent_dim: 1024
  dit_dim: 1536
  dit_ffn_dim: 8960
  dit_freq_dim: 256
  dit_num_heads: 12
  dit_num_layers: 30
  dit_patch_size: [1, 1, 1]  # no patchify; native RAE latent grid
  dit_max_seq_len: 1024
  dit_window_size: [-1, -1]

  # Flow matching
  fm_num_steps: 50
  fm_logit_normal_mean: 0.0
  fm_logit_normal_std: 1.0
  fm_model_timestep_scale: 1000.0

rae:
  model_name_or_path: "Qwen/Qwen3-VL-4B-Instruct"
  decoder_config_path: "config/decoder_config.json"
  decoder_checkpoint_path: "/scratch/e1539128/RAE/ckpts/stage1/qwen3vlrae_gram_v1.4_448/checkpoints/ep-0000029.pt"
  decoder_checkpoint_source: "ema"
  noise_tau: 0.0
  in_channels: 3
  denormalize_output: true
  do_resize: false
  local_files_only: true

# Keep sanity checks simple first; re-enable after pipeline is verified.
schedule_shift:
  enabled: false
  base_dim: 4096

latent_norm:
  enabled: true
  stats_path: "ckpts/latent_stats.pt"
  eps: 1.0e-6

cfg:
  context_dropout_prob: 0.0

training:
  # Short run with frequent sampling/checkpointing.
  epochs: 10
  steps_per_epoch: 300
  micro_batch_size_per_gpu: 3
  accumulation_steps: 1
  num_workers: 2
  prefetch_factor: 2
  clip_grad: 1.0
  log_interval: 10
  sample_every: 50
  save_checkpoints: false
  checkpoint_every_steps: 200
  maintain_ema: false
  ema_decay: 0.0
  precision: bf16
  global_seed: 42

  optimizer:
    lr: 3.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.01

# IMPORTANT:
# For sanity overfit we still fetch from HF, then lock to a tiny fixed subset.
data:
  source: "webdataset"
  data_files: "https://huggingface.co/datasets/ma-xu/fine-t2i/resolve/main/synthetic_enhanced_prompt_square_resolution/train-*.tar"
  # Use only a tiny fixed subset and loop over it.
  overfit_subset_size: 3
  # Visualize the same fixed subset samples every time.
  overfit_vis_count: 3
  split: "train"
  image_size: 448
  shuffle_buffer_size: 1
  text_keys: ["txt", "prompt", "text", "caption"]
  image_keys: ["jpg", "jpeg", "png", "webp", "image"]

wandb:
  enabled: true
  project: "uni-vug-dit"
  sample_with_ema: false
  sample_num_steps: 10
  sample_prompts:
    - "A golden retriever puppy playing in a field of wildflowers under a blue sky."
    - "A futuristic cityscape at sunset with flying cars and neon signs."
    - "A cozy cabin in a snowy mountain landscape with smoke coming from the chimney."
