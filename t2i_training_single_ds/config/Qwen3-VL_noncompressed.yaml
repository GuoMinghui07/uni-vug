stage_1:
  target: qwen3_vl_rae_noncompressed.Qwen3VLRAE
  params:
    model_name_or_path: 'Qwen/Qwen3-VL-4B-Instruct'
    local_files_only: false
    decoder_config_path: 'configs/decoder/Qwen3VL'
    noise_tau: 0.8
    in_channels: 3
    denormalize_output: true
    do_resize: false
    #normalization_stat_path: 'models/stats/qwen25/imagenet1k/stat.pt'

training:
  epochs: 16
  ema_decay: 0.9978
  global_batch_size: 512
  num_workers: 8
  clip_grad: 0.0
  log_interval: 100
  checkpoint_interval: 1
  sample_every: 1000
  optimizer:
    lr: 2e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: cosine
    warmup_epochs: 0.5
    decay_end_epoch: 16
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: true

# eval:
#   eval_interval: 2000
#   eval_model: true
#   data_path: 'data/imagenet/val/'
#   reference_npz_path: 'data/imagenet/val_256.npz'
#   metrics: ['psnr', 'ssim', 'rfid']

gan:
  disc:
    arch:
      dino_ckpt_path: 'models/discs/dino_vit_small_patch8_224.pth'
      ks: 9
      norm_type: 'bn'
      using_spec_norm: true
      recipe: 'S_8'
    optimizer:
      lr: 2.0e-4
      betas: [0.9, 0.95]
      weight_decay: 0.0
    scheduler:
      type: cosine
      warmup_epochs: 1
      decay_end_epoch: 16
      base_lr: 2.0e-4
      final_lr: 2.0e-5
      warmup_from_zero: true
    augment:
      prob: 1.0
      cutout: 0.0
  loss:
    disc_loss: hinge
    gen_loss: vanilla
    disc_weight: 0.75
    perceptual_weight: 1.0
    disc_start: 6.3
    disc_upd_start: 6
    lpips_start: 0
    max_d_weight: 10000.0
    disc_updates: 1
